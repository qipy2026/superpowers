<h2>数据可视化看板 — 整体布局</h2>
<p class="subtitle">18 个平台的数据如何展示？选一个布局方向</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>概览首页 + 平台详情页</h3>
      <p>首页显示所有平台的汇总统计和最近采集状态，点击进入每个平台的独立详情页（图表 + 数据表）</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>仪表盘 + 数据探索</h3>
      <p>一个滚动式仪表盘页面，按类别分区展示所有平台的关键指标，内置搜索和筛选</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>轻量 API 面板</h3>
      <p>最小化前端，侧重 API 文档和调试工具，数据以表格为主，不含图表</p>
    </div>
  </div>
</div>
