<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>看板</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="container"><h1>📊 数据爬虫看板</h1>
{{range $cat := categories}}<h2>{{categoryName $cat}}</h2>
{{range $card := $.Cards}}{{if eq $card.Category $cat}}
<div class="platform-card {{$card.CSS}}"><h3>{{$card.Label}}</h3><p>{{$card.Count}} 条</p></div>
{{end}}{{end}}{{end}}
</div></body></html>
